name: Build iOS Game

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Godot iOS Template
        run: |
          curl -L -o godot-ios.zip https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_ios.zip
          unzip godot-ios.zip
          
      - name: Build IPA
        run: |
          mkdir -p build
          echo "Your game would build here with proper Godot iOS export"
          echo "This requires your actual game files to be in the repository"
          touch build/game.ipa
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ArenaGame
          path: build/game.ipa
